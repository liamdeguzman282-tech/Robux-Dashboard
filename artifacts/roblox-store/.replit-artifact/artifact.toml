kind = "web"
previewPath = "/"
title = "Roblox Premium Storefront"
version = "1.0.0"
id = "artifacts/roblox-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23115

[services.development]
run = "pnpm --filter @workspace/roblox-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roblox-store", "run", "build" ]
publicDir = "artifacts/roblox-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23115"
BASE_PATH = "/"
